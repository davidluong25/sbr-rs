apiVersion: apps/v1
kind: Deployment
metadata:
  name: sbr-rs-api
  labels:
    app: sbr-rs-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sbr-rs-api
  template:
    metadata:
      labels:
        app: sbr-rs-api
    spec:
      containers:
      - name: sbr-rs-api
        image: sbr-rs:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sbr-rs-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: sbr-rs-secrets
              key: jwt-secret
        - name: BIND_ADDRESS
          value: "0.0.0.0:3000"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: sbr-rs-api-service
spec:
  selector:
    app: sbr-rs-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sbr-rs-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.sbr-rs.com
    secretName: sbr-rs-api-tls
  rules:
  - host: api.sbr-rs.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sbr-rs-api-service
            port:
              number: 80

---
apiVersion: v1
kind: Secret
metadata:
  name: sbr-rs-secrets
type: Opaque
stringData:
  database-url: "postgres://username:password@postgresql-service:5432/sbr_rs"
  jwt-secret: "your-super-secret-jwt-key-here"